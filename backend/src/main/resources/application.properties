spring.application.name=hero-bank-system-backend

# Oracle 11g Database Connection Settings
# If 'orcldee' is a SID use: jdbc:oracle:thin:@localhost:1521:orcldee
# If 'orcldee' is a Service Name use: jdbc:oracle:thin:@//localhost:1521/orcldee
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orcldee

# Oracle 11g is case-sensitive for passwords. Make sure these match EXACTLY.
# If you have special characters, you might need quotes depending on how the user was created.
spring.datasource.username=hero_bank
spring.datasource.password=hero_bank
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
# Explicitly setting dialect is recommended for Oracle 11g to avoid metadata connection issues
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8080
