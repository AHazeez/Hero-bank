spring:
  application:
    name: hero-bank-system-backend
  datasource:
    url: ${ORACLE_DB_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
    username: ${ORACLE_DB_USER:hero_bank}
    password: ${ORACLE_DB_PASSWORD:hero_bank}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect
    open-in-view: false

server:
  port: 8080
