<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Bank System Portal</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; }
    .wrap { max-width: 800px; margin: 32px auto; padding: 20px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    h1, h2 { margin-top: 0; }
    input, select, button { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #475569; background: #1f2937; color: #e2e8f0; }
    button { background: #c9a96e; color: #111827; font-weight: bold; border: none; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .msg { padding: 10px; border-radius: 8px; margin-bottom: 12px; display: none; }
    .ok { background: #14532d; color: #bbf7d0; display: block; }
    .err { background: #7f1d1d; color: #fecaca; display: block; }
    .hidden { display: none; }
    .account { border: 1px solid #334155; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    small { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Hero Bank System</h1>
    <small>Oracle database backed login and account creation flow</small>

    <div id="auth-card" class="card">
      <h2>Login / Register</h2>
      <div id="auth-msg" class="msg"></div>
      <div class="row">
        <div>
          <h3>Register</h3>
          <input id="reg-name" placeholder="Full name" />
          <input id="reg-email" placeholder="Email" />
          <input id="reg-password" type="password" placeholder="Password" />
          <button onclick="registerUser()">Register</button>
        </div>
        <div>
          <h3>Login</h3>
          <input id="login-email" placeholder="Email" />
          <input id="login-password" type="password" placeholder="Password" />
          <button onclick="loginUser()">Login</button>
        </div>
      </div>
    </div>

    <div id="account-card" class="card hidden">
      <h2>Create Account (After Login)</h2>
      <div id="acc-msg" class="msg"></div>
      <select id="acc-type">
        <option value="SAVINGS">Savings</option>
        <option value="CURRENT">Current</option>
      </select>
      <input id="acc-deposit" type="number" placeholder="Initial deposit" value="1000" />
      <input id="acc-currency" placeholder="Currency" value="INR" />
      <button onclick="createAccount()">Create Account</button>
      <button onclick="loadAccounts()" style="background:#3b82f6;color:#fff;">Refresh My Accounts</button>

      <h3>My Accounts</h3>
      <div id="account-list"></div>
    </div>
  </div>

  <script>
    const API_BASE = "/api/v1";
    let token = localStorage.getItem("hero_token") || "";

    function setMsg(id, text, ok) {
      const el = document.getElementById(id);
      el.className = "msg " + (ok ? "ok" : "err");
      el.textContent = text;
    }

    function setLoggedIn(nextToken) {
      token = nextToken;
      localStorage.setItem("hero_token", token);
      document.getElementById("account-card").classList.remove("hidden");
      loadAccounts();
    }

    async function registerUser() {
      try {
        const payload = {
          fullName: document.getElementById("reg-name").value,
          email: document.getElementById("reg-email").value,
          password: document.getElementById("reg-password").value
        };
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.message || "Registration failed");
        setMsg("auth-msg", "Registration successful. Logged in.", true);
        setLoggedIn(data.data.token);
      } catch (err) {
        setMsg("auth-msg", err.message, false);
      }
    }

    async function loginUser() {
      try {
        const payload = {
          email: document.getElementById("login-email").value,
          password: document.getElementById("login-password").value
        };
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.message || "Login failed");
        setMsg("auth-msg", "Login successful.", true);
        setLoggedIn(data.data.token);
      } catch (err) {
        setMsg("auth-msg", err.message, false);
      }
    }

    async function createAccount() {
      try {
        const payload = {
          type: document.getElementById("acc-type").value,
          initialDeposit: Number(document.getElementById("acc-deposit").value || 0),
          currency: document.getElementById("acc-currency").value
        };
        const res = await fetch(`${API_BASE}/accounts`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.message || "Account creation failed");
        setMsg("acc-msg", `Account created: ${data.data.accountNumber}`, true);
        loadAccounts();
      } catch (err) {
        setMsg("acc-msg", err.message, false);
      }
    }

    async function loadAccounts() {
      if (!token) return;
      try {
        const res = await fetch(`${API_BASE}/accounts`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.message || "Failed to load accounts");
        document.getElementById("account-list").innerHTML = data.data.map(a => `
          <div class="account">
            <div><b>${a.type}</b> - ${a.accountNumber}</div>
            <div>Balance: ${a.balance} ${a.currency}</div>
            <small>Status: ${a.status}</small>
          </div>
        `).join("");
      } catch (err) {
        setMsg("acc-msg", err.message, false);
      }
    }

    if (token) {
      document.getElementById("account-card").classList.remove("hidden");
      loadAccounts();
    }
  </script>
</body>
</html>
