services:
  oracle-db:
    image: gvenzl/oracle-free:23-slim
    container_name: hero-bank-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: hero_bank
      APP_USER: hero_bank
      APP_USER_PASSWORD: hero_bank
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 20
