version: '3.8'

services:
  # Oracle Database
  oracle-db:
    image: gvenzl/oracle-free:23-slim
    container_name: hero-bank-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: hero_bank
      APP_USER: hero_bank
      APP_USER_PASSWORD: hero_bank
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 20
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - bank-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hero-bank-backend
    ports:
      - "8080:8080"
    environment:
      ORACLE_DB_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      ORACLE_DB_USER: hero_bank
      ORACLE_DB_PASSWORD: hero_bank
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      oracle-db:
        condition: service_healthy
    networks:
      - bank-network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hero-bank-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    networks:
      - bank-network
    restart: unless-stopped

volumes:
  oracle_data:

networks:
  bank-network:
    driver: bridge
